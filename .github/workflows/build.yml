name: Build RM3 Planner

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            texlive-xetex \
            texlive-latex-extra \
            texlive-latex-recommended \
            texlive-pictures \
            texlive-fonts-recommended \
            uuid-runtime \
            python3

      - name: Generate TeX
        env:
          PLANNER_YEAR: "2026"
        run: |
          go run cmd/plannergen/plannergen.go \
            --config cfg/base.yaml,cfg/template_months_on_side.yaml,cfg/rm3.base.yaml,cfg/rm3.mos.default.yml,cfg/rm3.mos.default.dailycal.yaml

      - name: Compile PDF
        run: |
          xelatex -file-line-error -interaction=nonstopmode -output-directory=./out out/rm3.mos.default.dailycal.tex
          xelatex -file-line-error -interaction=nonstopmode -output-directory=./out out/rm3.mos.default.dailycal.tex
          cp out/rm3.mos.default.dailycal.pdf planner.2026.pdf

      - name: Upload PDF
        uses: actions/upload-artifact@v4
        with:
          name: planner-2026-rm3
          path: planner.2026.pdf
          if-no-files-found: error

