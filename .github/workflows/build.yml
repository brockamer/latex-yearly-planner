name: Build RM3 Planner

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            texlive-xetex \
            texlive-latex-extra \
            texlive-latex-recommended \
            texlive-pictures \
            texlive-fonts-recommended \
            uuid-runtime \
            python3

      - name: Build RM3 planner
        run: |
          ./rm3_build.sh
          if [ ! -f planner.2026.pdf ]; then
            echo "=== Build log ===" && cat /tmp/planner.2026.log || true
            echo "=== out/ contents ===" && ls -la out/ || true
            exit 1
          fi

      - name: Upload PDF
        uses: actions/upload-artifact@v4
        with:
          name: planner-2026-rm3
          path: planner.2026.pdf
          if-no-files-found: error

